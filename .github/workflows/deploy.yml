name: Deploy su GitHub Pages

# Pubblica ad ogni push sul branch principale.
on:
  push:
    branches: [main]
  workflow_dispatch: # permette anche l'avvio manuale dalla tab Actions

# Permessi necessari a GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Evita deploy sovrapposti: l'ultimo push vince.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Installa dipendenze
        run: npm ci

      # Dominio custom (renovasport.it) servito sulla radice → base '/'.
      # Il file public/CNAME mantiene il dominio su ogni deploy.
      - name: Build
        env:
          VITE_BASE: /
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SUPABASE_STORAGE_BUCKET: ${{ secrets.VITE_SUPABASE_STORAGE_BUCKET }}
        run: npm run build

      - name: Carica artifact per Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy su GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
